<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bearing Master Pro</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg-main: #020408;
            --bg-card: rgba(15, 23, 42, 0.85);
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-main);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
            background-color: var(--bg-main);
            position: relative;
        }

        /* Background Engine Layer */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            background: transparent;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .hidden { display: none !important; }

        /* Persistent Custom/Default Logo Badge */
        .corner-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 85px;
            height: 85px;
            background-color: #ffffff;
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        
        .corner-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Top Bar Utilities containing Global Settings Controls */
        .top-controls-wrapper {
            position: absolute;
            top: 25px;
            right: 30px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Flag Dynamic Translation Toggles */
        .lang-selector {
            display: flex;
            gap: 6px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #475569;
        }

        .lang-flag {
            width: 32px;
            height: 22px;
            cursor: pointer;
            border-radius: 3px;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.1s;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .lang-flag.active-lang {
            opacity: 1;
            transform: scale(1.08);
            border-color: var(--accent);
        }

        .utility-bar { display: flex; gap: 10px; }
        .ui-btn { background: var(--bg-card); backdrop-filter: blur(8px); border: 1px solid #475569; color: var(--text-main); padding: 8px 16px; font-size: 0.85rem; width: auto; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .ui-btn-danger { border-color: #ef4444; color: #fca5a5; }
        .ui-btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* Configuration Menu Dashboard Form Card */
        #setup-screen {
            max-width: 550px;
            margin: auto;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-height: 95vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 18px; text-align: left; }
        .name-inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; }
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 2px solid #334155; border-radius: 8px; color: white; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--accent); }
        
        /* File Uploader Custom Design Interface */
        .file-upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-upload-sub-label {
            display: block;
            text-align: center;
            background: #1e293b;
            border: 2px dashed #475569;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.88rem;
            transition: background 0.2s;
        }
        .file-upload-btn-wrapper:hover .file-upload-sub-label {
            background: #334155;
            color: white;
        }
        .file-upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        button { 
            background: var(--accent); 
            color: #0f172a; 
            border: none; 
            padding: 14px 28px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            transition: background 0.2s, transform 0.1s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        button:hover { background: var(--accent-hover); }
        button:active { transform: scale(0.98); }

        #game-screen { display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
        
        /* Main Layout Grid Optimized for Workspace Space */
        .game-main-area { display: grid; grid-template-columns: 330px 1fr; gap: 40px; align-items: start; flex-grow: 1; max-width: 1250px; margin: 0 auto; width: 100%; padding-top: 10px; }
        
        /* Sidebar container containing target and scoreboard combined */
        .sidebar { background: var(--bg-card); backdrop-filter: blur(12px); padding: 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #334155; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* De-capitalized and visually enhanced target goal typography */
        .target-goal-title { font-size: 1.05rem; font-weight: 700; color: var(--text-muted); }
        .target-box { font-size: 3.2rem; font-weight: 800; color: #f59e0b; line-height: 1.1; }

        /* Feedback display area with distinct spacing background to prevent overlapping */
        .feedback-area { font-size: 1rem; line-height: 1.4; padding: 12px; background: rgba(0, 0, 0, 0.25); border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.05); min-height: 80px; display: flex; align-items: center; justify-content: center; }

        /* Compact Scoreboard Integrated inside Left Sidebar */
        .scoreboard-wrapper { width: 100%; border-radius: 8px; border: 1px solid #334155; overflow: hidden; background: rgba(15, 23, 42, 0.6); }
        .scoreboard { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .scoreboard th, .scoreboard td { padding: 10px 12px; border-bottom: 1px solid #334155; text-align: left; }
        .scoreboard th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(0,0,0,0.2); }
        
        /* Strict Width Rules for the Point Metrics column */
        .col-score { width: 65px; text-align: right; }
        .scoreboard td.col-score { text-align: right; font-variant-numeric: tabular-nums; }
        .active-player-row { background: rgba(56, 189, 248, 0.2); color: white; font-weight: 600; }

        /* Accuracy Legend Score Matrix Block */
        .legend-wrapper { background: rgba(30, 41, 59, 0.4); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); padding: 10px; text-align: left; }
        .legend-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; text-align: center; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; text-size-adjust: none; }
        .legend-item { background: rgba(0,0,0,0.2); padding: 6px; border-radius: 4px; text-align: center; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.02); }
        .legend-val { font-weight: bold; color: var(--accent); display: block; margin-bottom: 2px; }
        .legend-pts { font-size: 0.75rem; color: var(--success); font-weight: 600; }

        /* Compass Canvas Container Positioning */
        .compass-container {
            position: relative;
            width: 520px; 
            height: 520px; 
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            align-self: center;
        }

        .direction-label { position: absolute; font-weight: 800; font-size: 2rem; color: var(--text-main); text-shadow: 0 0 10px rgba(0,0,0,0.9); user-select: none; z-index: 4; }
        .label-n { top: -5px; left: 50%; transform: translateX(-50%); color: var(--danger); }
        .label-e { right: -5px; top: 50%; transform: translateY(-50%); }
        .label-s { bottom: -5px; left: 50%; transform: translateX(-50%); }
        .label-w { left: -5px; top: 50%; transform: translateY(-50%); }

        .compass {
            width: 450px; 
            height: 450px; 
            border-radius: 50%;
            border: 14px solid #334155;
            background: transparent; 
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.6);
            overflow: visible;
        }

        .needle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px; 
            height: 50%;
            background: var(--accent);
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            z-index: 3;
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
        }

        .target-needle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px; 
            height: 50%;
            background: var(--success);
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s ease-out;
            box-shadow: 0 0 8px var(--success);
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px; 
            height: 22px; 
            background: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.9);
        }

        #podium-screen { max-width: 600px; margin: auto; text-align: center; width: 100%; background: var(--bg-card); backdrop-filter: blur(16px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .podium-container { display: flex; justify-content: center; align-items: flex-end; height: 240px; margin: 30px 0; gap: 15px; position: relative; }
        .podium-step { display: flex; flex-direction: column; align-items: center; width: 95px; opacity: 0; animation: popUp 0.6s ease-out forwards; z-index: 2; }
        .podium-block { width: 100%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.6rem; color: #0f172a; border-top-left-radius: 6px; border-top-right-radius: 6px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .step-1 { animation-delay: 0.4s; } .step-2 { animation-delay: 0.2s; } .step-3 { animation-delay: 0s; } .step-4 { animation-delay: 0.6s; }
        .step-1 .podium-block { height: 140px; background: #f59e0b; border: 2px solid #ffd700; }
        .step-2 .podium-block { height: 110px; background: #cbd5e1; }
        .step-3 .podium-block { height: 80px; background: #b45309; }
        .step-4 .podium-block { height: 50px; background: #64748b; }
        .podium-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; text-overflow: ellipsis; overflow: hidden; width: 100%; white-space: nowrap; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        @keyframes popUp { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(40px); } }

        @media (max-width: 850px) {
            .game-main-area { grid-template-columns: 1fr; gap: 20px; }
            .compass-container { width: 340px; height: 340px; }
            .compass { width: 290px; height: 290px; }
            .name-inputs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                <option value="4">4 ${dict.playerUnits}s</option>
            `;
            if(prevPlayerCount) playerCountSelect.value = prevPlayerCount;

            const prevRange = angleRangeSelect.value;
            angleRangeSelect.innerHTML = `
                <option value="90">${dict.boundsOpt1}</option>
                <option value="180">${dict.boundsOpt2}</option>
                <option value="360">${dict.boundsOpt3}</option>
            `;
            if(prevRange) angleRangeSelect.value = prevRange;

            const prevTheme = themeSelector.value;
            themeSelector.innerHTML = `
                <option value="starfield">${dict.themeOpt1}</option>
                <option value="matrix">${dict.themeOpt2}</option>
                <option value="aurora">${dict.themeOpt3}</option>
            `;
            if(prevTheme) themeSelector.value = prevTheme;

            // Update utility menu action headers
            endEarlyBtn.textContent = dict.earlyEnd;
            fullscreenBtn.textContent = dict.fullscreen;

            // Redraw dynamically generated fields if viewing setup pane
            if (!setupScreen.classList.contains('hidden')) {
                buildNameInputFields();
            }

            // Live updates if game session is already in active running state
            if (!gameScreen.classList.contains('hidden')) {
                document.getElementById('tx-target-goal').textContent = dict.targetGoal;
                document.getElementById('tx-legend-title').textContent = dict.legendTitle;
                document.getElementById('tx-table-headers').innerHTML = `<th>${dict.thCompetitor}</th><th class="col-score">${dict.thStandings}</th>`;
                
                currentPlayerDisplay.textContent = `${players[currentPlayerIdx].name}`;
                
                if (gameState === 'ready') {
                    statusFeedback.textContent = dict.initSpinPrompt;
                    roundDisplay.textContent = `${dict.turnLabel} ${currentRound} / ${totalTurns}`;
                    roundDisplay.style.color = "var(--text-muted)";
                } else if (gameState === 'spinning') {
                    statusFeedback.textContent = dict.activeSpinPrompt;
                } else if (gameState === 'stopped') {
                    evaluateScoreMarkupOnly(); 
                }
            }

            // Handle podium translation contexts
            if (!podiumScreen.classList.contains('hidden')) {
                document.getElementById('tx-match-over').textContent = dict.matchOver;
                restartBtn.textContent = dict.mainMenuBtn;
                renderWinnerAnnouncementText();
            }
        }

        function handleResize() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            confCanvas.width = window.innerWidth;
            confCanvas.height = window.innerHeight;
        }

        function buildNameInputFields() {
            const count = parseInt(playerCountSelect.value) || 1;
            const dict = dictionary[currentLang];
            
            const currentInputs = document.querySelectorAll('.custom-name-field');
            const savedVals = [];
            currentInputs.forEach(inp => savedVals.push(inp.value));

            nameInputsContainer.innerHTML = '';
            for(let i = 1; i <= count; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'form-group';
                const currentFallbackName = savedVals[i-1] || `${dict.defaultPlayerName} ${i}`;
                wrap.innerHTML = `<label>${dict.playerUnits} ${i}</label><input type="text" class="custom-name-field" value="${currentFallbackName}" maxlength="16">`;
                nameInputsContainer.appendChild(wrap);
            }
        }

        function handleLogoFileImport(event) {
            const chosenFile = event.target.files[0];
            if (!chosenFile) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                displayBadgeImg.src = base64Data;
                
                try {
                    localStorage.setItem('bearing_master_pro_custom_logo', base64Data);
                } catch(error) {
                    console.warn("Storage quota exceeded. Logo cannot be cached persistently.");
                }
            };
            reader.readAsDataURL(chosenFile);
        }

        function retrieveStoredPersistentLogo() {
            const cachedLogo = localStorage.getItem('bearing_master_pro_custom_logo');
            if (cachedLogo) {
                displayBadgeImg.src = cachedLogo;
            }
        }

        function toggleBrowserFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function initGame() {
            const nameFields = document.querySelectorAll('.custom-name-field');
            const dict = dictionary[currentLang];
            totalTurns = parseInt(document.getElementById('turns-count').value) || 3;
            maxAngleRange = parseInt(document.getElementById('angle-range').value);
            
            players = [];
            nameFields.forEach((field, idx) => {
                let nameStr = field.value.trim();
                if(!nameStr) nameStr = `${dict.defaultPlayerName} ${idx + 1}`;
                players.push({ id: idx + 1, name: nameStr, score: 0 });
            });

            currentPlayerIdx = 0;
            currentRound = 1;
            
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            utilityBar.classList.remove('hidden');
            
            document.getElementById('tx-target-goal').textContent = dict.targetGoal;
            document.getElementById('tx-legend-title').textContent = dict.legendTitle;
            document.getElementById('tx-table-headers').innerHTML = `<th>${dict.thCompetitor}</th><th class="col-score">${dict.thStandings}</th>`;
            
            generateScoreboard();
            setupTurn();
        }

        function generateScoreboard() {
            scoreboardBody.innerHTML = '';
            players.forEach((p, idx) => {
                const row = document.createElement('tr');
                row.id = `player-row-${idx}`;
                row.innerHTML = `<td>${p.name}</td><td class="col-score"><span id="player-score-${idx}">0</span></td>`;
                scoreboardBody.appendChild(row);
            });
        }

        function setupTurn() {
            gameState = 'ready';
            currentAngle = 0;
            needle.style.transform = `translateX(-50%) rotate(0deg)`;
            targetNeedle.style.opacity = '0';

            targetAngle = Math.floor(Math.random() * (maxAngleRange + 1));
            targetDisplay.textContent = String(targetAngle).padStart(3, '0') + '°';
            
            currentPlayerDisplay.textContent = `${players[currentPlayerIdx].name}`;
            roundDisplay.textContent = `${dictionary[currentLang].turnLabel} ${currentRound} / ${totalTurns}`;
            roundDisplay.style.color = "var(--text-muted)";
            
            statusFeedback.textContent = dictionary[currentLang].initSpinPrompt;
            statusFeedback.style.color = "var(--text-muted)";
            
            players.forEach((_, idx) => {
                document.getElementById(`player-row-${idx}`).classList.toggle('active-player-row', idx === currentPlayerIdx);
            });
        }

        function handleCompassClick() {
            if (gameState === 'stopped' && Date.now() < actionInputLockPeriod) {
                return; 
            }

            if (gameState === 'ready') {
                gameState = 'spinning';
                statusFeedback.textContent = dictionary[currentLang].activeSpinPrompt;
                statusFeedback.style.color = "var(--accent)";
                spinNeedle();
            } else if (gameState === 'spinning') {
                gameState = 'stopped';
                cancelAnimationFrame(animationFrameId);
                evaluateScore();
            } else if (gameState === 'stopped') {
                advanceTurn();
            }
        }

        function spinNeedle() {
            currentAngle = (currentAngle + 1.2) % 360; 
            needle.style.transform = `translateX(-50%) rotate(${currentAngle}deg)`;
            if (gameState === 'spinning') {
                animationFrameId = requestAnimationFrame(spinNeedle);
            }
        }

        function evaluateScore() {
            actionInputLockPeriod = Date.now() + 1200;

            const finalAngle = Math.round(currentAngle);
            let diff = Math.abs(finalAngle - targetAngle);
            if (diff > 180) diff = 360 - diff;

            let points = 0;
            if (diff <= 5) points = 10;
            else if (diff <= 10) points = 5;
            else if (diff <= 15) points = 2;

            players[currentPlayerIdx].score += points;
            document.getElementById(`player-score-${currentPlayerIdx}`).textContent = players[currentPlayerIdx].score;

            targetNeedle.style.transform = `translateX(-50%) rotate(${targetAngle}deg)`;
            targetNeedle.style.opacity = '1';

            evaluateScoreMarkupOnly();
        }

        function evaluateScoreMarkupOnly() {
            const dict = dictionary[currentLang];
            const finalAngle = Math.round(currentAngle);
            let diff = Math.abs(finalAngle - targetAngle);
            if (diff > 180) diff = 360 - diff;

            let points = 0;
            if (diff <= 5) points = 10;
            else if (diff <= 10) points = 5;
            else if (diff <= 15) points = 2;

            let nextPlayerName = "";
            let isLastTurn = false;

            if (currentPlayerIdx + 1 >= players.length) {
                if (currentRound >= totalTurns) {
                    isLastTurn = true;
                } else {
                    nextPlayerName = players[0].name;
                }
            } else {
                nextPlayerName = players[currentPlayerIdx + 1].name;
            }

            // Put next action instruction dynamically in sub-label to keep layouts stable
            if (isLastTurn) {
                roundDisplay.textContent = dict.clickForStandings;
            } else {
                roundDisplay.textContent = `${dict.clickForNext} ${nextPlayerName}`;
            }
            roundDisplay.style.color = "var(--accent)";

            if (points > 0) {
                statusFeedback.innerHTML = `<div style="width:100%; text-align:center;">${dict.stoppedAt} <strong>${String(finalAngle).padStart(3, '0')}°</strong>.<br>${dict.correctWas} <span style="color:var(--success); font-weight:bold;">${String(targetAngle).padStart(3, '0')}°</span> (${diff}° ${dict.offUnits}).<br><span style="color:var(--success); font-weight:bold; font-size:1.15rem;">+${points} ${dict.pointsAdded}</span></div>`;
            } else {
                statusFeedback.innerHTML = `<div style="width:100%; text-align:center;">${dict.stoppedAt} <strong>${String(finalAngle).padStart(3, '0')}°</strong>.<br>${dict.correctWas} <span style="color:var(--success); font-weight:bold;">${String(targetAngle).padStart(3, '0')}°</span> (${diff}° ${dict.offUnits}).<br><span style="color:var(--danger); font-weight:bold; font-size:1.15rem;">${dict.zeroPts}</span></div>`;
            }
        }

        function advanceTurn() {
            currentPlayerIdx++;
            if (currentPlayerIdx >= players.length) {
                currentPlayerIdx = 0;
                currentRound++;
            }

            if (currentRound > totalTurns) {
                showPodium();
            } else {
                setupTurn();
            }
        }

        function showPodium() {
            gameScreen.classList.add('hidden');
            utilityBar.classList.add('hidden');
            podiumScreen.classList.remove('hidden');

            document.getElementById('tx-match-over').textContent = dictionary[currentLang].matchOver;
            restartBtn.textContent = dictionary[currentLang].mainMenuBtn;
            
            renderWinnerAnnouncementText();

            podiumContainer.innerHTML = '';
            const ranked = [...players].sort((a, b) => b.score - a.score);
            
            let renderingOrder = [];
            if (ranked.length === 1) renderingOrder = [ranked[0]];
            if (ranked.length === 2) renderingOrder = [ranked[1], ranked[0]];
            if (ranked.length === 3) renderingOrder = [ranked[1], ranked[0], ranked[2]];
            if (ranked.length === 4) renderingOrder = [ranked[1], ranked[0], ranked[2], ranked[3]];

            renderingOrder.forEach((player) => {
                const rankIdx = ranked.indexOf(player);
                const step = document.createElement('div');
                step.className = `podium-step step-${rankIdx + 1}`;
                step.innerHTML = `
                    <div class="podium-name">${player.name}</div>
                    <div class="podium-block">${rankIdx + 1}</div>
                    <div style="font-size: 0.9rem; margin-top: 5px; color: var(--text-muted); font-weight: bold;">${player.score} ${dictionary[currentLang].ptsLabel}</div>
                `;
                podiumContainer.appendChild(step);
            });

            setTimeout(() => {
                const topStepBlock = document.querySelector('.step-1 .podium-block');
                if (topStepBlock) {
                    const rect = topStepBlock.getBoundingClientRect();
                    burstOriginX = rect.left + rect.width / 2;
                    burstOriginY = rect.top;
                } else {
                    burstOriginX = window.innerWidth / 2;
                    burstOriginY = window.innerHeight * 0.6;
                }
                startConfettiExplosion();
            }, 50);
        }

        function renderWinnerAnnouncementText() {
            if(players.length === 0) return;
            const dict = dictionary[currentLang];
            const ranked = [...players].sort((a, b) => b.score - a.score);
            
            if (ranked[0].score === ranked[ranked.length - 1].score && ranked.length > 1) {
                winnerAnnouncement.textContent = dict.tieTitle;
            } else {
                winnerAnnouncement.textContent = `${ranked[0].name} ${dict.winTitle}`;
            }
        }

        function resetToSetup() {
            stopConfettiExplosion();
            podiumScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
            buildNameInputFields();
        }

        /* --- Sharp Pinpoint Background Rendering Pipeline Engine --- */
        function initBackgroundEngine() {
            handleResize();
            
            bgStars = [];
            for(let i=0; i<450; i++) {
                bgStars.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: Math.random() * 25, 
                    speedMult: Math.random() * 0.25 + 0.8,
                    brightness: Math.random() * 40 + 60
                });
            }

            matrixStreams = [];
            const columns = Math.floor(window.innerWidth / 20) + 1;
            for(let i=0; i<columns; i++) {
                matrixStreams.push({
                    x: i * 20,
                    y: Math.random() * -1000,
                    speed: Math.random() * 3 + 2,
                    chars: Array.from({length: Math.floor(Math.random() * 15) + 10}, () => String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)))
                });
            }

            runBackgroundLoop();
        }

        function runBackgroundLoop() {
            bgCtx.fillStyle = '#020408';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const cx = bgCanvas.width / 2;
            const cy = bgCanvas.height / 2;

            if (activeTheme === 'starfield') {
                bgStars.forEach(star => {
                    star.radius += (0.2 + 0.035 * star.radius) * star.speedMult;
                    
                    if(star.radius > 650) { 
                        star.radius = Math.random() * 5; 
                        star.angle = Math.random() * Math.PI * 2; 
                    }

                    const px = cx + Math.cos(star.angle) * star.radius;
                    const py = cy + Math.sin(star.angle) * star.radius;

                    if(px >= 0 && px <= bgCanvas.width && py >= 0 && py <= bgCanvas.height) {
                        bgCtx.fillStyle = `rgba(255, 255, 255, ${star.brightness / 100})`;
                        bgCtx.beginPath();
                        bgCtx.arc(px, py, 1.2, 0, Math.PI * 2);
                        bgCtx.fill();
                    }
                });
            } 
            else if (activeTheme === 'matrix') {
                bgCtx.font = '14px monospace';
                matrixStreams.forEach(stream => {
                    stream.y += stream.speed;
                    if(stream.y > bgCanvas.height) {
                        stream.y = -200;
                        stream.speed = Math.random() * 3 + 2;
                    }
                    stream.chars.forEach((char, i) => {
                        const opacity = i / stream.chars.length;
                        bgCtx.fillStyle = `rgba(56, 189, 248, ${opacity * 0.4})`;
                        bgCtx.fillText(char, stream.x, stream.y + (i * 16));
                    });
                    if(Math.random() < 0.02) {
                        stream.chars[Math.floor(Math.random() * stream.chars.length)] = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
                    }
                });
            } 
            else if (activeTheme === 'aurora') {
                auroraPhase += 0.003;
                for(let i = 0; i < 3; i++) {
                    const gradient = bgCtx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
                    gradient.addColorStop(0, 'transparent');
                    gradient.addColorStop(0.5, `rgba(${i === 0 ? '34,197,94' : i === 1 ? '56,189,248' : '168,85,247'}, 0.07)`);
                    gradient.addColorStop(1, 'transparent');
                    
                    bgCtx.fillStyle = gradient;
                    bgCtx.beginPath();
                    bgCtx.moveTo(0, bgCanvas.height);
                    for(let x = 0; x <= bgCanvas.width; x += 50) {
                        const y = bgCanvas.height * 0.4 + Math.sin(x * 0.002 + auroraPhase + i) * 150;
                        bgCtx.lineTo(x, y);
                    }
                    bgCtx.lineTo(bgCanvas.width, bgCanvas.height);
                    bgCtx.closePath();
                    bgCtx.fill();
                }
            }

            requestAnimationFrame(runBackgroundLoop);
        }

        /* --- Volcanic Confetti Eruption --- */
        function startConfettiExplosion() {
            confettiActive = true;
            confettiParticles = [];
            for (let i = 0; i < 100; i++) {
                spawnVolcanicParticle();
            }
            runConfettiLoop();
        }

        function spawnVolcanicParticle() {
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.3; 
            const speed = Math.random() * 12 + 6;
            confettiParticles.push({
                x: burstOriginX,
                y: burstOriginY,
                size: Math.random() * 7 + 5,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                gravity: 0.28,
                color: `hsl(${Math.random() * 360}, 95%, 60%)`,
                rotation: Math.random() * 360,
                rotSpeed: Math.random() * 6 - 3,
                opacity: 1
            });
        }

        function runConfettiLoop() {
            if (!confettiActive) return;
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);

            if (confettiParticles.length < 200) {
                for(let k = 0; k < 4; k++) spawnVolcanicParticle();
            }

            for (let i = confettiParticles.length - 1; i >= 0; i--) {
                let p = confettiParticles[i];
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;

                if (p.y > confCanvas.height - 100) {
                    p.opacity -= 0.02;
                }

                if (p.opacity <= 0 || p.x < 0 || p.x > confCanvas.width) {
                    confettiParticles.splice(i, 1);
                    continue;
                }

                confCtx.save();
                confCtx.translate(p.x, p.y);
                confCtx.rotate((p.rotation * Math.PI) / 180);
                confCtx.globalAlpha = p.opacity;
                confCtx.fillStyle = p.color;
                confCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                confCtx.restore();
            }

            requestAnimationFrame(runConfettiLoop);
        }

        function stopConfettiExplosion() {
            confettiActive = false;
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
            confettiParticles = [];
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
